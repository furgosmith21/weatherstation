<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather Station Live</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#08131f;
color:white;
text-align:center;
}
.header{
background:#10263d;
padding:18px;
font-size:28px;
font-weight:bold;
}
.card{
background:#16314d;
margin:12px;
padding:18px;
border-radius:14px;
font-size:22px;
box-shadow:0 0 10px rgba(0,0,0,.35);
}
.big{
font-size:34px;
font-weight:bold;
}
.green{color:#00ff88;}
.red{color:#ff4444;}
.footer{
padding:18px;
font-size:14px;
color:#aaa;
}
</style>
</head>

<body>

<div class="header">🌦 SHAO WEATHER STATION</div>

<div class="card big" id="status">Checking...</div>
<div class="card big" id="condition">Loading...</div>
<div class="card" id="signal">Signal</div>

<div class="card" id="temp">Temp</div>
<div class="card" id="hum">Humidity</div>
<div class="card" id="pres">Pressure</div>

<div class="card" id="rain">Rain</div>
<div class="card" id="wind">Wind</div>
<div class="card" id="gust">Gust</div>

<div class="card" id="last">Last Update</div>

<div class="footer">
ESP32 + LoRa + Firebase + GitHub
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyA-Il7Uh8nSXoP44UGGipBWWBIbmCxybUU",
databaseURL: "https://weatherstation-shao-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref("weather");

db.on("value", (snap)=>{

let d = snap.val();
if(!d) return;

document.getElementById("condition").innerHTML =
"Condition: " + d.condition;

document.getElementById("signal").innerHTML =
"Storm: " + d.signal;

document.getElementById("temp").innerHTML =
"🌡 Temp: " + d.temp + " °C";

document.getElementById("hum").innerHTML =
"💧 Humidity: " + d.humidity + " %";

document.getElementById("pres").innerHTML =
"⏲ Pressure: " + d.pressure + " hPa";

document.getElementById("rain").innerHTML =
"🌧 Rain: " + d.rain;

document.getElementById("wind").innerHTML =
"💨 Wind: " + d.wind;

document.getElementById("gust").innerHTML =
"🌪 Gust: " + d.gust;

// online/offline check
let age = (Date.now() - d.time) / 1000;

if(age < 15){
document.getElementById("status").innerHTML =
"<span class='green'>🟢 RECEIVER ONLINE</span>";
}else{
document.getElementById("status").innerHTML =
"<span class='red'>🔴 RECEIVER OFFLINE</span>";
}

let dt = new Date(d.time);

document.getElementById("last").innerHTML =
"Last Update: " + dt.toLocaleString();

});
</script>

</body>
</html>
```
