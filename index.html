<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>SHAO Weather Monitoring</title>

<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>

<style>
:root{
  --bg:#08131f;
  --card:#efefef;
  --head:#10263d;
  --accent:#11b0b5;
  --text:#111;
}

body.light{
  --bg:#eef4fa;
  --card:#fff;
  --head:#11b0b5;
  --text:#111;
}

/* ✅ FULL SCREEN FIX */
body{
  margin:0;
  background:var(--bg);
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  color:var(--text);
  transition:.4s;
}

/* CARD FULL SCREEN CONTROL */
.card{
  width:95%;
  max-width:520px;
  height:100vh;
  display:flex;
  flex-direction:column;
  border-radius:12px;
  overflow:hidden;
}

/* TOP BAR */
.topbar,.bottombar{
  background:var(--head);
  color:#fff;
  text-align:center;
  padding:10px;
  font-weight:bold;
  flex-shrink:0;
}

/* HEADER TAKES AVAILABLE SPACE */
.header{
  flex:1;
  position:relative;
  padding:12px;
  min-height:0;
  overflow:hidden;
}

/* CLOCK */
.clock{
  position:absolute;
  top:15px;
  right:15px;
  width:140px;
  height:140px;
  border-radius:50%;
  background:var(--accent);
  border:6px solid #fff;
}

/* HANDS */
.hand{
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
}

.hour{width:4px;height:35px;background:#fff}
.minute{width:3px;height:50px;background:#fff}
.second{width:2px;height:58px;background:red}

.digital{
  position:absolute;
  left:12px;
  top:60px;
  font-size:11px;
  color:#fff;
}

/* WEATHER ICON */
.weather-icon{
  font-size:34px;
  animation:float 2s infinite alternate;
}

@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(-6px)}
}

/* FOOTER GRID */
.footerstats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  background:var(--accent);
  padding:10px;
  color:#fff;
  text-align:center;
  flex-shrink:0;
  font-size:12px;
}

@media(min-width:600px){
  .footerstats{
    grid-template-columns:repeat(4,1fr);
  }
}

.badge{
  padding:4px 8px;
  border-radius:20px;
  background:#ff9800;
  color:#fff;
  font-size:11px;
}
</style>
</head>

<body>

<div class='card'>
  <div class='topbar'>🌦 MARINDUQUE LIVE WEATHER STATION</div>

  <div class='header'>
    <h3 id='date'></h3>
    <div id='status'></div>

    <div style='display:flex;align-items:center;gap:10px'>
      <div class='weather-icon' id='icon'>☀️</div>
      <div id='conditionLabel' style='font-size:16px;font-weight:bold'>SUNNY</div>
    </div>

    <div style='font-size:34px' id='temp'>--°C</div>
    <div>Heat Index <span id='heat'>--°C</span></div>

    <div id='signalBadge' class='badge'>No Signal</div>

    <div class='clock'>
      <div style='position:absolute;inset:0;color:white;font-size:11px'>
        <span style='position:absolute;top:4px;left:62px'>12</span>
        <span style='position:absolute;top:12px;right:30px'>1</span>
        <span style='position:absolute;top:30px;right:10px'>2</span>
        <span style='position:absolute;top:60px;right:2px'>3</span>
        <span style='position:absolute;bottom:30px;right:10px'>4</span>
        <span style='position:absolute;bottom:12px;right:30px'>5</span>
        <span style='position:absolute;bottom:4px;left:64px'>6</span>
        <span style='position:absolute;bottom:12px;left:30px'>7</span>
        <span style='position:absolute;bottom:30px;left:10px'>8</span>
        <span style='position:absolute;top:60px;left:2px'>9</span>
        <span style='position:absolute;top:30px;left:10px'>10</span>
        <span style='position:absolute;top:12px;left:30px'>11</span>
      </div>

      <div class='hand hour' id='hour'></div>
      <div class='hand minute' id='minute'></div>
      <div class='hand second' id='second'></div>
      <div class='digital' id='digital'></div>
    </div>
  </div>

  <div class='footerstats'>
    <div><small>WEATHER</small><div id='condition'></div></div>
    <div><small>RAIN</small><div id='rain'></div></div>
    <div><small>HUMIDITY</small><div id='hum'></div></div>
    <div><small>WIND</small><div id='wind'></div></div>
    <div><small>PRESSURE</small><div id='pres2'></div></div>
    <div><small>GUST</small><div id='gust2'></div></div>
  </div>

  <div class='bottombar'>SHAO WEATHER MONITORING <span id='last'></span></div>
</div>

<script>
const firebaseConfig={
  apiKey:'AIzaSyA-Il7Uh8nSXoP44UGGipBWWBIbmCxybUU',
  databaseURL:'https://weatherstation-shao-default-rtdb.asia-southeast1.firebasedatabase.app/'
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database().ref('weather');

function updateClock(){
  let n=new Date(),
  h=n.getHours()%12,
  m=n.getMinutes(),
  s=n.getSeconds();

  hour.style.transform=`translateX(-50%) rotate(${h*30+m/2}deg)`;
  minute.style.transform=`translateX(-50%) rotate(${m*6}deg)`;
  second.style.transform=`translateX(-50%) rotate(${s*6}deg)`;

  digital.innerText=n.toLocaleTimeString('en-US',{hour12:true});
  date.innerText=n.toDateString();

  document.body.className=(n.getHours()>18||n.getHours()<6)?'':'light';
}

setInterval(updateClock,1000);
updateClock();

db.on('value',snap=>{
  let d=snap.val();
  if(!d)return;

  condition.innerHTML=d.condition;
  conditionLabel.innerHTML=d.condition.toUpperCase();
  temp.innerHTML=d.temp+'°C';
  hum.innerHTML=d.humidity+'%';
  rain.innerHTML=d.rain;
  wind.innerHTML=d.wind;
  pres2.innerHTML=d.pressure+' hPa';
  gust2.innerHTML=d.gust;

  heat.innerHTML=(parseFloat(d.temp)+(parseFloat(d.humidity)*0.1)).toFixed(1)+'°C';

  signalBadge.innerHTML='⚠ '+d.signal;
  last.innerHTML=new Date(d.time).toLocaleString();

  icon.innerHTML=d.condition.includes('Rain')?'🌧️':
                 d.condition.includes('Cloud')?'☁️':'☀️';

  status.innerHTML=(Date.now()-d.time<15000)?'🟢 ONLINE':'🔴 OFFLINE';
});
</script>

</body>
</html>
