<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Shao Weather Monitoring</title>

<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>

<style>
:root{--bg:#08131f;--card:#efefef;--head:#10263d;--accent:#11b0b5;--text:#111}
body.light{--bg:#eef4fa;--card:#fff;--head:#11b0b5;--text:#111}

body{
margin:0;
background:var(--bg);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:var(--text);
transition:.4s
}

.card{
width:95%;
max-width:520px;
background:var(--card);
border-radius:12px;
overflow:hidden
}

.topbar,.bottombar{
background:var(--head);
color:#fff;
text-align:center;
padding:14px;
font-weight:bold
}

.header{
position:relative;
padding:22px;
min-height:290px
}

.clock{
position:absolute;
top:25px;
right:18px;
width:160px;
height:160px;
border-radius:50%;
background:var(--accent);
border:8px solid #F6F862
}

.hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom}
.hour{width:4px;height:40px;background:#fff}
.minute{width:3px;height:58px;background:#fff}
.second{width:2px;height:65px;background:red}

.digital{position:absolute;left:22px;top:72px;font-size:10.5px;color:#fff}

.footerstats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
background:var(--accent);
padding:16px;
color:#fff;
text-align:center
}

.weather-icon{
font-size:40px;
animation:float 2s infinite alternate
}

.badge{
padding:5px 10px;
border-radius:20px;
background:#ff9800;
color:#fff;
font-size:12px
}

@keyframes float{from{transform:translateY(0)}to{transform:translateY(-8px)}}

@media(min-width:600px){
.footerstats{grid-template-columns:repeat(4,1fr)}
}
</style>

</head>

<body>

<div class='card'>

<div class='topbar'>🌦 MARINDUQUE LIVE WEATHER MONITORING</div>

<div class='header'>

<h2 id='date'></h2>
<div id='status'></div>

<div style='display:flex;align-items:center;gap:12px'>
<div class='weather-icon' id='icon'>☀️</div>
<div id='conditionLabel' style='font-size:18px;font-weight:bold'>--</div>
</div>

<div style='font-size:40px;margin-top:15px' id='temp'>--°C</div>

<div style='margin-top:55px;font-size:18px'>
Feels Like <span id='heat'>--°C</span>
</div>

<div style='margin-top:12px'>
<span id='signalBadge' class='badge'>SIGNAL: --</span>
</div>

<div class='clock'>
<div style='position:absolute;inset:0;color:white;font-size:13px'>
<span style='position:absolute;top:4px;left:72px'>12</span>
<span style='position:absolute;top:14px;right:40px'>1</span>
<span style='position:absolute;top:38px;right:14px'>2</span>
<span style='position:absolute;top:72px;right:4px'>3</span>
<span style='position:absolute;bottom:38px;right:14px'>4</span>
<span style='position:absolute;bottom:14px;right:40px'>5</span>
<span style='position:absolute;bottom:4px;left:74px'>6</span>
<span style='position:absolute;bottom:14px;left:40px'>7</span>
<span style='position:absolute;bottom:38px;left:14px'>8</span>
<span style='position:absolute;top:72px;left:4px'>9</span>
<span style='position:absolute;top:38px;left:14px'>10</span>
<span style='position:absolute;top:14px;left:40px'>11</span>
</div>

<div class='hand hour' id='hour'></div>
<div class='hand minute' id='minute'></div>
<div class='hand second' id='second'></div>
<div class='digital' id='digital'></div>
</div>

</div>

<div class='footerstats'>

<div><small>WIND DIR</small><div id='windDir'>--</div></div>
<div><small>WIND SPEED</small><div id='wind'>--</div></div>

<div><small>HUMIDITY</small><div id='hum'>--</div></div>
<div><small>PRESSURE</small><div id='pres2'>--</div></div>

<div><small>RAIN</small><div id='rain'>--</div></div>
<div><small>GUST</small><div id='gust2'>--</div></div>

</div>

<div class='bottombar'>
SHAO WEATHER STATION
</div>

</div>

<script>

const firebaseConfig = {
apiKey:'AIzaSyA-Il7Uh8nSXoP44UGGipBWWBIbmCxybUU',
databaseURL:'https://weatherstation-shao-default-rtdb.asia-southeast1.firebasedatabase.app/'
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref('weather');

function updateClock(){
let n=new Date(),
h=n.getHours()%12,
m=n.getMinutes(),
s=n.getSeconds();

hour.style.transform=`translateX(-50%) rotate(${h*30+m/2}deg)`;
minute.style.transform=`translateX(-50%) rotate(${m*6}deg)`;
second.style.transform=`translateX(-50%) rotate(${s*6}deg)`;

digital.innerText=n.toLocaleTimeString();
date.innerText=n.toDateString();

document.body.className=(n.getHours()>18||n.getHours()<6)?'':'light';
}

setInterval(updateClock,1000);
updateClock();

db.on('value',snap=>{
let d = snap.val();
if(!d) return;

// SAFE VALUES
let temp = parseFloat(d.temp || 0);
let hum = parseFloat(d.humidity || 0);
let press = parseFloat(d.pressure || 0);
let rain = parseFloat(d.rain || 0);
let wind = parseFloat(d.wind || 0);
let gust = parseFloat(d.gust || 0);
let dir = parseFloat(d.winddir || 0);
let card = d.cardinal || "N";

// CONDITION SHORTEN
let cond = d.condition || "--";
if(cond === "PARTLY CLOUDY") cond = "P. CLOUDY";
conditionLabel.innerHTML = cond.toUpperCase();

// TEMP SAFE
temp.innerHTML = d.temp ? temp.toFixed(1) + '°C' : "--°C";

// HUMIDITY WHOLE NUMBER
hum.innerHTML = Math.round(hum) + '%';

// OTHER VALUES
rain.innerHTML = rain.toFixed(1);
wind.innerHTML = wind.toFixed(1);
pres2.innerHTML = press.toFixed(1) + ' hPa';
gust2.innerHTML = gust.toFixed(1);

// WIND DIR
windDir.innerHTML = card + " (" + dir + "°)";

// FEELS LIKE
let feelsLike = temp + (hum * 0.1);
heat.innerHTML = feelsLike.toFixed(1) + '°C';

// ICON
icon.innerHTML =
(d.condition?.includes('Rain')) ? '🌧️' :
(d.condition?.includes('Cloud')) ? '☁️' : '☀️';

// SIGNAL LEVEL
let signal = 0;

if(gust > 50 || wind > 30) signal = 1;
if(gust > 60 || wind > 40) signal = 2;
if(gust > 70) signal = 3;

signalBadge.innerHTML = "SIGNAL #" + signal;

// STATUS (optional safe)
status.innerHTML = d.time ? "" : "";

});

</script>

</body>
</html>
