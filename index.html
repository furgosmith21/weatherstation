<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>SHAO Weather Monitoring PRO</title>

<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>

<style>
:root{
  --bg:#08131f;
  --card:#efefef;
  --head:#10263d;
  --accent:#11b0b5;
  --text:#111;
}

body.light{
  --bg:#eef4fa;
  --card:#fff;
  --head:#11b0b5;
  --text:#111;
}

/* 🌍 FULL SCREEN + NO SCROLL */
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
  position:relative;
}

/* 🌫️ subtle animated background */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(17,176,181,0.08), transparent 60%);
  animation:moveBg 12s infinite linear;
  z-index:0;
}

@keyframes moveBg{
  0%{transform:translate(-10%,-10%)}
  50%{transform:translate(-20%,10%)}
  100%{transform:translate(-10%,-10%)}
}

/* 📱 CARD */
.card{
  width:96%;
  max-width:520px;
  height:100vh;
  display:flex;
  flex-direction:column;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  z-index:1;
}

/* HEADER & FOOTER */
.topbar,.bottombar{
  background:var(--head);
  color:#fff;
  text-align:center;
  padding:8px;
  font-weight:bold;
  font-size:14px;
  flex-shrink:0;
}

.header{
  flex:1;
  padding:10px;
  position:relative;
  overflow:hidden;
}

/* WEATHER ICON */
.weather-icon{
  font-size:32px;
  animation:float 2s infinite alternate;
}

@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(-6px)}
}

/* CLOCK */
.clock{
  position:absolute;
  top:10px;
  right:10px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:var(--accent);
  border:5px solid #fff;
}

.hand{
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
}

.hour{width:4px;height:30px;background:#fff}
.minute{width:3px;height:42px;background:#fff}
.second{width:2px;height:50px;background:red}

.digital{
  position:absolute;
  left:10px;
  top:50px;
  font-size:10px;
  color:#fff;
}

/* MAIN TEXT */
#temp{
  font-size:32px;
  margin-top:5px;
}

.badge{
  padding:4px 8px;
  border-radius:20px;
  background:#ff9800;
  color:#fff;
  font-size:11px;
  display:inline-block;
}

/* FOOTER GRID */
.footerstats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  background:var(--accent);
  padding:8px;
  color:#fff;
  text-align:center;
  font-size:11px;
  flex-shrink:0;
}

@media(min-width:600px){
  .footerstats{
    grid-template-columns:repeat(4,1fr);
  }
}

/* 🧠 SMART RESPONSIVE SCALE */
@media(max-height:700px){
  #temp{font-size:28px}
  .clock{width:105px;height:105px}
}

@media(max-height:600px){
  #temp{font-size:24px}
  .clock{width:95px;height:95px}
}
</style>
</head>

<body>

<div class='card'>
  <div class='topbar'>🌦 SHAO WEATHER PRO</div>

  <div class='header'>
    <h3 id='date'></h3>
    <div id='status'></div>

    <div style='display:flex;align-items:center;gap:10px'>
      <div class='weather-icon' id='icon'>☀️</div>
      <div id='conditionLabel' style='font-weight:bold'>SUNNY</div>
    </div>

    <div id='temp'>--°C</div>
    <div>Heat Index <span id='heat'>--°C</span></div>

    <div id='signalBadge' class='badge'>No Signal</div>

    <!-- CLOCK -->
    <div class='clock'>
      <div class='hand hour' id='hour'></div>
      <div class='hand minute' id='minute'></div>
      <div class='hand second' id='second'></div>
      <div class='digital' id='digital'></div>
    </div>
  </div>

  <div class='footerstats'>
    <div><small>WEATHER</small><div id='condition'></div></div>
    <div><small>RAIN</small><div id='rain'></div></div>
    <div><small>HUMIDITY</small><div id='hum'></div></div>
    <div><small>WIND</small><div id='wind'></div></div>
    <div><small>PRESSURE</small><div id='pres2'></div></div>
    <div><small>GUST</small><div id='gust2'></div></div>
  </div>

  <div class='bottombar'>SHAO SYSTEM <span id='last'></span></div>
</div>

<script>
const firebaseConfig={
  apiKey:'AIzaSyA-Il7Uh8nSXoP44UGGipBWWBIbmCxybUU',
  databaseURL:'https://weatherstation-shao-default-rtdb.asia-southeast1.firebasedatabase.app/'
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database().ref('weather');

/* CLOCK */
function updateClock(){
  let n=new Date(),
  h=n.getHours()%12,
  m=n.getMinutes(),
  s=n.getSeconds();

  hour.style.transform=`translateX(-50%) rotate(${h*30+m/2}deg)`;
  minute.style.transform=`translateX(-50%) rotate(${m*6}deg)`;
  second.style.transform=`translateX(-50%) rotate(${s*6}deg)`;

  digital.innerText=n.toLocaleTimeString('en-US',{hour12:true});
  date.innerText=n.toDateString();

  document.body.className=(n.getHours()>18||n.getHours()<6)?'':'light';
}

setInterval(updateClock,1000);
updateClock();

/* DATA */
db.on('value',snap=>{
  let d=snap.val();
  if(!d){
    signalBadge.innerHTML="❌ NO DATA";
    return;
  }

  condition.innerHTML=d.condition;
  conditionLabel.innerHTML=d.condition.toUpperCase();
  temp.innerHTML=d.temp+'°C';
  hum.innerHTML=d.humidity+'%';
  rain.innerHTML=d.rain;
  wind.innerHTML=d.wind;
  pres2.innerHTML=d.pressure+' hPa';
  gust2.innerHTML=d.gust;

  heat.innerHTML=(parseFloat(d.temp)+(parseFloat(d.humidity)*0.1)).toFixed(1)+'°C';

  last.innerHTML=new Date(d.time).toLocaleString();

  icon.innerHTML=d.condition.includes('Rain')?'🌧️':
                 d.condition.includes('Cloud')?'☁️':'☀️';

  /* SMART ONLINE/OFFLINE */
  let diff=Date.now()-d.time;
  if(diff<15000){
    status.innerHTML='🟢 ONLINE';
    signalBadge.innerHTML='LIVE';
  }else if(diff<60000){
    status.innerHTML='🟡 DELAYED';
    signalBadge.innerHTML='WEAK SIGNAL';
  }else{
    status.innerHTML='🔴 OFFLINE';
    signalBadge.innerHTML='NO SIGNAL';
  }
});
</script>

</body>
</html>
