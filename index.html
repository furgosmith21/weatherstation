<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>SHAO Weather Monitoring</title>

<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js'></script>
<script src='https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js'></script>

<style>
:root{
--bg:#08131f;
--card:#efefef;
--head:#10263d;
--accent:#11b0b5;
--text:#111;
}

body.light{
--bg:#eef4fa;
--card:#fff;
--head:#11b0b5;
--text:#111;
}

body{
margin:0;
background:var(--bg);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:var(--text);
transition:.4s;
}

.card{
width:95%;
max-width:520px;
background:var(--card);
border-radius:12px;
overflow:hidden;
}

.topbar,.bottombar{
background:var(--head);
color:#fff;
text-align:center;
padding:14px;
font-weight:bold;
}

/* FIXED HEADER SIZE */
.header{
position:relative;
padding:18px;
min-height:260px;
}

/* FIXED ANALOG CLOCK */
.clock{
position:absolute;
top:20px;
right:18px;
width:150px;
height:150px;
border-radius:50%;
background:var(--accent);
border:8px solid #fff;
box-sizing:border-box;
}

/* CLOCK NUMBERS PERFECT POSITION */
.clock span{
position:absolute;
color:#fff;
font-size:13px;
transform:translate(-50%,-50%);
}

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
}

.hour{
width:4px;
height:38px;
background:#fff;
}

.minute{
width:3px;
height:55px;
background:#fff;
}

.second{
width:2px;
height:62px;
background:red;
}

/* FIXED DIGITAL CLOCK */
.digital{
position:absolute;
left:50%;
top:52%;
transform:translate(-50%,-50%);
font-size:11px;
color:#fff;
font-weight:bold;
}

.footerstats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
background:var(--accent);
padding:16px;
color:#fff;
text-align:center;
}

.weather-icon{
font-size:40px;
animation:float 2s infinite alternate;
}

.badge{
padding:5px 10px;
border-radius:20px;
background:#ff9800;
color:#fff;
font-size:12px;
display:inline-block;
margin-top:6px;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-8px)}
}

@media(min-width:600px){
.footerstats{
grid-template-columns:repeat(4,1fr);
}
}
</style>
</head>

<body>

<div class='card'>

<div class='topbar'>🌦 MARINDUQUE LIVE WEATHER STATION</div>

<div class='header'>

<h2 id='date'></h2>
<div id='status'></div>

<div style='display:flex;align-items:center;gap:12px'>
<div class='weather-icon' id='icon'>☀️</div>
<div id='conditionLabel' style='font-size:18px;font-weight:bold'>SUNNY</div>
</div>

<div style='font-size:40px' id='temp'>--°C</div>
<div>Heat Index <span id='heat'>--°C</span></div>

<div id='signalBadge' class='badge'>No Signal</div>

<!-- CLOCK -->
<div class='clock'>

<span style='left:50%;top:10%'>12</span>
<span style='left:72%;top:16%'>1</span>
<span style='left:86%;top:31%'>2</span>
<span style='left:91%;top:50%'>3</span>
<span style='left:86%;top:69%'>4</span>
<span style='left:72%;top:84%'>5</span>
<span style='left:50%;top:90%'>6</span>
<span style='left:28%;top:84%'>7</span>
<span style='left:14%;top:69%'>8</span>
<span style='left:9%;top:50%'>9</span>
<span style='left:14%;top:31%'>10</span>
<span style='left:28%;top:16%'>11</span>

<div class='hand hour' id='hour'></div>
<div class='hand minute' id='minute'></div>
<div class='hand second' id='second'></div>

<div class='digital' id='digital'></div>

</div>
</div>

<div class='footerstats'>
<div><small>WEATHER</small><div id='condition'></div></div>
<div><small>RAIN</small><div id='rain'></div></div>
<div><small>HUMIDITY</small><div id='hum'></div></div>
<div><small>WIND</small><div id='wind'></div></div>
<div><small>PRESSURE</small><div id='pres2'></div></div>
<div><small>GUST</small><div id='gust2'></div></div>
</div>

<div class='bottombar'>
SHAO WEATHER MONITORING
<span id='last'></span>
</div>

</div>

<script>
const firebaseConfig={
apiKey:'AIzaSyA-Il7Uh8nSXoP44UGGipBWWBIbmCxybUU',
databaseURL:'https://weatherstation-shao-default-rtdb.asia-southeast1.firebasedatabase.app/'
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database().ref('weather');

function updateClock(){
let n=new Date();
let h=n.getHours()%12;
let m=n.getMinutes();
let s=n.getSeconds();

hour.style.transform=`translateX(-50%) rotate(${h*30+m/2}deg)`;
minute.style.transform=`translateX(-50%) rotate(${m*6}deg)`;
second.style.transform=`translateX(-50%) rotate(${s*6}deg)`;

digital.innerText=n.toLocaleTimeString('en-US',{hour12:true});
date.innerText=n.toDateString();

document.body.className=(n.getHours()>18||n.getHours()<6)?'':'light';
}

setInterval(updateClock,1000);
updateClock();

db.on('value',snap=>{
let d=snap.val();
if(!d)return;

condition.innerHTML=d.condition;
conditionLabel.innerHTML=d.condition.toUpperCase();
temp.innerHTML=d.temp+'°C';
hum.innerHTML=d.humidity+'%';
rain.innerHTML=d.rain;
wind.innerHTML=d.wind;
pres2.innerHTML=d.pressure+' hPa';
gust2.innerHTML=d.gust;

heat.innerHTML=(parseFloat(d.temp)+(parseFloat(d.humidity)*0.1)).toFixed(1)+'°C';

signalBadge.innerHTML='⚠ '+d.signal;
last.innerHTML=' '+new Date(d.time).toLocaleString();

icon.innerHTML=
d.condition.includes('Rain')?'🌧️':
d.condition.includes('Cloud')?'☁️':'☀️';

status.innerHTML=
(Date.now()-d.time<15000)?'🟢 ONLINE':'🔴 OFFLINE';
});
</script>

</body>
</html>
