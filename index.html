<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marinduque Live Weather</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* ===== BASIC UI ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#e8e8e8;padding:15px}

.container{
max-width:1000px;margin:auto;background:#fff;
border-radius:25px;overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,.2);
}

.header{
background:#13B8BF;color:#fff;
padding:25px;text-align:center;
font-size:38px;font-weight:bold;
}

.main{
display:flex;flex-wrap:wrap;
padding:30px;justify-content:space-between;
align-items:center;
}

.left{width:45%}

.date{font-size:55px;font-weight:bold;margin-bottom:20px}

.temp{font-size:90px;margin-top:15px}

.feels{margin-top:30px;font-size:28px}

.feelsValue{font-size:50px;font-weight:bold}

.signal{
margin-top:20px;
display:inline-block;
padding:12px 25px;
border-radius:30px;
font-size:22px;
font-weight:bold;
color:white;
background:#3498DB;
transition:.3s;
}

/* CLOCK */
.clockContainer{width:400px;height:400px;position:relative}

.clock{
width:100%;height:100%;
background:#13B8BF;
border:10px solid gold;
border-radius:50%;
position:relative;
}

.number{
position:absolute;
color:white;
font-size:30px;
transform:translate(-50%,-50%);
font-weight:bold;
}

.hand{
position:absolute;
left:50%;bottom:50%;
transform-origin:bottom;
}

.hour{width:8px;height:90px;background:white}
.minute{width:6px;height:130px;background:white}
.second{width:3px;height:150px;background:red}

.center{
position:absolute;
width:15px;height:15px;
background:white;
border-radius:50%;
left:50%;top:50%;
transform:translate(-50%,-50%);
}

.digital{
position:absolute;
bottom:80px;
width:100%;
text-align:center;
font-size:18px;
font-weight:bold;
color:white;
}

/* BOTTOM DATA */
.bottom{
background:#13B8BF;
color:white;
padding:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
text-align:center;
}

.box{font-size:22px;line-height:1.8}

.footer{
background:#13B8BF;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}




@media(max-width:900px){

.main{
display:flex;
flex-wrap:nowrap; /* IMPORTANT: bawal bumaba */
flex-direction:row;
justify-content:space-between;
align-items:flex-start;
padding:15px;
gap:8px;
}

.left{
width:60%;
min-width:0;
}

.clockContainer{
width:140px;
height:140px;
flex-shrink:0; /* IMPORTANT */
}

.number{
font-size:14px;
}

.hour{
height:35px;
}

.minute{
height:50px;
}

.second{
height:60px;
}

.digital{
font-size:10px;
bottom:30px;
}

.date{
font-size:22px;
}

.temp{
font-size:42px;
}

.feels{
font-size:16px;
margin-top:15px;
}

.feelsValue{
font-size:26px;
}

.signal{
font-size:13px;
padding:6px 10px;
}

.bottom{
grid-template-columns:1fr 1fr;
padding:15px;
gap:15px;
}

.box{
font-size:15px;
line-height:1.6;
}

.footer{
font-size:22px;
}

}






.left{
width:55%;
}

.clockContainer{
width:180px;
height:180px;
flex-shrink:0;
}

.number{
font-size:18px;
}

.hour{
height:45px;
}

.minute{
height:65px;
}

.second{
height:75px;
}

.digital{
font-size:12px;
bottom:40px;
}

.date{
font-size:24px;
}

.temp{
font-size:45px;
}

.feels{
font-size:18px;
}

.feelsValue{
font-size:30px;
}

.signal{
font-size:14px;
padding:8px 12px;
}

.bottom{
grid-template-columns:1fr 1fr;
font-size:16px;
padding:15px;
}

.box{
font-size:16px;
}

}
}

.weatherStatus{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
font-size:28px;
font-weight:bold;
color:#333;
}

#weatherIcon{
font-size:55px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}


</style>
</head>

<body>

<div class="container">

<div class="header">🌦 MARINDUQUE LIVE WEATHER MONITORING</div>

<div class="main">

<div class="left">

<div class="date" id="date"></div>

<div class="weatherStatus">
  <div id="weatherIcon">☀️</div>
  <div id="weatherCondition">SUNNY</div>
</div>

<div class="temp"><span id="temp">--</span>°C</div>

<div class="feels">
Feels Like
<div class="feelsValue"><span id="feelsLike">--</span>°C</div>
</div>

<div class="signal" id="stormSignal">🌀 Signal No.0</div>

</div>

<div class="clockContainer">

<div class="clock" id="clock">
<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
<div class="center"></div>
<div class="digital" id="digital"></div>
</div>

</div>

</div>

<div class="bottom">

<div class="box">
🧭 WIND DIR<br><span id="windDirection"></span><br><br>
💧 HUMIDITY<br><span id="humidity"></span>%<br><br>
📉 PRESSURE<br><span id="pressure"></span> hPa
</div>

<div class="box">
🌧️ RAIN<br><span id="rain"></span> mm<br><br>
🌬️ WIND<br><span id="wind"></span> km/h<br><br>
💨 GUST<br><span id="gust"></span> km/h
</div>

</div>

<div class="footer">SHAO WEATHER STATION</div>

</div>

<script>

/* ===== FIREBASE ===== */
const firebaseConfig = {
apiKey: "AIzaSyA-Il7Uh8nSXoP44UGGipBWWBIbmCxybUU",
authDomain: "weatherstation-shao.firebaseapp.com",
databaseURL: "https://weatherstation-shao-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "weatherstation-shao"
};

firebase.initializeApp(firebaseConfig);

/* ===== CLOCK ===== */
function updateClock(){

let now=new Date();

document.getElementById("date").innerHTML=now.toDateString();
document.getElementById("digital").innerHTML=
now.toLocaleTimeString('en-US',{
hour:'numeric',
minute:'2-digit',
second:'2-digit',
hour12:true
});

let s=now.getSeconds();
let m=now.getMinutes();
let h=now.getHours();

document.getElementById("second").style.transform=
`translateX(-50%) rotate(${s*6}deg)`;

document.getElementById("minute").style.transform=
`translateX(-50%) rotate(${m*6}deg)`;

document.getElementById("hour").style.transform=
`translateX(-50%) rotate(${h*30+m/2}deg)`;

}

setInterval(updateClock,1000);
updateClock();

/* ===== CLOCK NUMBERS ===== */
const clock=document.getElementById("clock");

function drawNumbers(){

document.querySelectorAll(".number").forEach(n=>n.remove());

let size=clock.offsetWidth;
let center=size/2;
let radius=size*0.40;

for(let i=1;i<=12;i++){

let num=document.createElement("div");
num.className="number";

let angle=(i*30-90)*(Math.PI/180);

let x=center+radius*Math.cos(angle);
let y=center+radius*Math.sin(angle);

num.style.left=x+"px";
num.style.top=y+"px";

num.innerHTML=i;
clock.appendChild(num);

}

}

drawNumbers();
window.addEventListener("resize",drawNumbers);

/* ===== HEAT INDEX ===== */
function computeHeatIndex(T,R){

let HI=
-8.784695+
1.61139411*T+
2.338549*R
-.14611605*T*R
-.012308094*T*T
-.016424828*R*R
+.002211732*T*T*R
+.00072546*T*R*R
-.000003582*T*T*R*R;

return HI.toFixed(1);
}

/* ===== TYHOON SIGNAL ===== */
function updateStormSignal(level){

const el=document.getElementById("stormSignal");

switch(level){

case 1: el.innerHTML="🌀 Signal No.1"; el.style.background="#2ECC71"; break;
case 2: el.innerHTML="🌀 Signal No.2"; el.style.background="#F1C40F"; break;
case 3: el.innerHTML="🌀 Signal No.3"; el.style.background="#E67E22"; break;
case 4: el.innerHTML="🌀 Signal No.4"; el.style.background="#E74C3C"; break;
case 5: el.innerHTML="🌀 Signal No.5"; el.style.background="#8E44AD"; break;
default: el.innerHTML="🌀 Signal No.0"; el.style.background="#3498DB";

}

}

/* ===== LIVE FIREBASE DATA ===== */
firebase.database()
.ref("weather")
.on("value",(snapshot)=>{

let d=snapshot.val();
console.log(d);

let temp = Number(d.temp || 0);
let humidity = Number(d.humidity || 0);

let condition=(d.condition || "SUNNY").toUpperCase();

let icon="☀️";

switch(condition){

case "SUNNY":
icon="☀️";
break;

case "PARTLY CLOUDY":
icon="⛅";
break;

case "CLOUDY":
icon="☁️";
break;

case "RAINY":
icon="🌧️";
break;

case "THUNDERSTORM":
icon="⛈️";
break;

case "WINDY":
icon="🌬️";
break;

default:
icon="🌤️";
}

document.getElementById("weatherIcon").innerHTML=icon;
document.getElementById("weatherCondition").innerHTML=condition;

document.getElementById("temp").innerHTML = Number(d.temp) || 0;
document.getElementById("humidity").innerHTML = Math.round(Number(d.humidity) || 0);
document.getElementById("pressure").innerHTML=Math.round(Number(d.pressure) || 0);
document.getElementById("wind").innerHTML=d.wind;
document.getElementById("gust").innerHTML=d.gust;
document.getElementById("rain").innerHTML=d.rain;
document.getElementById("windDirection").innerHTML=d.winddir;

document.getElementById("feelsLike").innerHTML=
computeHeatIndex(
parseFloat(d.temp || 0),
parseFloat(d.humidity || 0)
);
updateStormSignal(d.stormSignal);

});

</script>

</body>
</html>
