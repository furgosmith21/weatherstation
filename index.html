<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marinduque Live Weather</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<!-- GALAW NG HANGIN -->
<script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@2.1.4/dist/leaflet-velocity.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@2.1.4/dist/leaflet-velocity.min.css">

<style>

/* ===== BASIC UI ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#e8e8e8;padding:15px}

.container{
max-width:1000px;margin:auto;background:#fff;
border-radius:25px;overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,.2);
}

.header{
background:#13B8BF;color:#fff;
padding:25px;text-align:center;
font-size:38px;font-weight:bold;
}

.main{
display:flex;flex-wrap:wrap;
padding:30px;justify-content:space-between;
align-items:center;
}

.left{width:45%}

.date{font-size:55px;font-weight:bold;margin-bottom:20px}

.temp{font-size:90px;margin-top:15px}

.feels{margin-top:30px;font-size:28px}

.feelsValue{font-size:50px;font-weight:bold}

.signal{
margin-top:20px;
display:inline-block;
padding:12px 25px;
border-radius:30px;
font-size:22px;
font-weight:bold;
color:white;
background:#3498DB;
transition:.3s;
}

/* CLOCK */
.clockContainer{width:400px;height:400px;position:relative}

.clock{
width:100%;height:100%;
background:#13B8BF;
border:10px solid gold;
border-radius:50%;
position:relative;
}

.number{
position:absolute;
color:white;
font-size:30px;
transform:translate(-50%,-50%);
font-weight:bold;
}

.hand{
position:absolute;
left:50%;bottom:50%;
transform-origin:bottom;
}

.hour{width:5px;height:90px;background:white}
.minute{width:4px;height:130px;background:white}
.second{width:3px;height:150px;background:red}

.center{
position:absolute;
width:15px;height:15px;
background:white;
border-radius:50%;
left:50%;top:50%;
transform:translate(-50%,-50%);
}

.digital{
position:absolute;
bottom:80px;
width:100%;
text-align:center;
font-size:18px;
font-weight:bold;
color:black;
letter-spacing:1px;
z-index:1;
}


/* BOTTOM DATA */
.bottom{
background:#13B8BF;
color:white;
padding:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
text-align:center;
}

.box{font-size:22px;line-height:1.8}

.footer{
background:#13B8BF;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}


/* MAP */
#map{
height:500px;
width:100%;
border-radius:20px;
margin-top:20px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,.3);
border:4px solid #13B8BF;
}

@media(max-width:900px){
  .main{flex-wrap:nowrap; flex-direction:row; padding:15px; gap:8px; align-items:flex-start;}
  .left{width:55%; min-width:0;}
  .clockContainer{width:160px; height:160px; flex-shrink:0;}
  .number{font-size:16px;}
  .hour{height:38px;}
  .minute{height:55px;}
  .second{height:65px;}
  .digital{font-size:11px; bottom:35px;}
  .date{font-size:24px;}
  .temp{font-size:45px;}
  .feels{font-size:18px; margin-top:15px;}
  .feelsValue{font-size:30px;}
  .signal{font-size:14px; padding:8px 12px;}
  .bottom{padding:15px; gap:15px;}
  .box{font-size:16px; line-height:1.6;}
  .footer{font-size:22px;}
  #map{height:350px;}
}
.weatherStatus{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
font-size:28px;
font-weight:bold;
color:#333;
}

#weatherIcon{
font-size:55px;
animation:float 2s infinite ease-in-out;
}


@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}

.icon{
display:inline-block;
width:35px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">🌦 MARINDUQUE LIVE WEATHER MONITORING</div>

<div class="main">

<div class="left">

<div class="date" id="date"></div>

<div class="weatherStatus">
  <div id="weatherIcon">☀️</div>
  <div id="weatherCondition">SUNNY</div>
</div>

<div class="temp"><span id="temp">--</span>°C</div>

<div class="feels">
Feels Like
<div class="feelsValue"><span id="feelsLike">--</span>°C</div>
</div>

<div class="signal" id="stormSignal">🌀 Signal No.0</div>
<div class="signal" id="deviceStatus">
STATION ONLINE
</div>
</div>

<div class="clockContainer">

<div class="clock" id="clock">
<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
<div class="center"></div>
<div class="digital" id="digital"></div>
</div>

</div>

</div>

<div class="bottom">

<div class="box">
<span class="icon">🧭</span>WIND DIR<br>
<span id="windDirection"></span>  (<span id="windDegrees"></span>°)<br><br>

<span class="icon">💧</span>HUMIDITY<br>
<span id="humidity"></span>%<br><br>

<span class="icon">📉</span>PRESSURE<br>
<span id="pressure"></span> hPa
</div>

<div class="box">
<span class="icon">🌧️</span>RAIN<br>
<span id="rain"></span> mm<br><br>

<span class="icon">🌬️</span>WIND<br>
<span id="wind"></span> km/h<br><br>

<span class="icon">💨</span>GUST<br>
<span id="gust"></span> km/h

</div>
</div>
<div id="map"></div>

<div class="footer">SHAO WEATHER STATION</div>

</div>

<script>

/* ===== FIREBASE ===== */
const firebaseConfig = {
apiKey: "AIzaSyA-Il7Uh8nSXoP44UGGipBWWBIbmCxybUU",
authDomain: "weatherstation-shao.firebaseapp.com",
databaseURL: "https://weatherstation-shao-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "weatherstation-shao"
};

firebase.initializeApp(firebaseConfig);

/* ===== CLOCK ===== */
function updateClock(){

let now=new Date();

document.getElementById("date").innerHTML=now.toDateString();
document.getElementById("digital").innerHTML=
now.toLocaleTimeString('en-US',{
hour:'numeric',
minute:'2-digit',
second:'2-digit',
hour12:true
});

let s=now.getSeconds();
let m=now.getMinutes();
let h=now.getHours();

document.getElementById("second").style.transform=
`translateX(-50%) rotate(${s*6}deg)`;

document.getElementById("minute").style.transform=
`translateX(-50%) rotate(${m*6}deg)`;

document.getElementById("hour").style.transform=
`translateX(-50%) rotate(${h*30+m/2}deg)`;

}

setInterval(updateClock,1000);
updateClock();

/* ===== CLOCK NUMBERS ===== */
const clock=document.getElementById("clock");

function drawNumbers(){

document.querySelectorAll(".number").forEach(n=>n.remove());

let size = clock.offsetWidth;
let center = size < 250
    ? size / 2.26
    : size / 2.11;
let radius = size * 0.395;

for(let i=1;i<=12;i++){

let num=document.createElement("div");
num.className="number";

let angle=(i*30-90)*(Math.PI/180);

let x=center+(radius*Math.cos(angle));
let y=center+(radius*Math.sin(angle));

num.style.left=x+"px";
num.style.top=y+"px";

num.innerHTML=i;

// auto-size depende sa clock size
num.style.fontSize=(size*0.08)+"px";

clock.appendChild(num);

}

}

drawNumbers();
window.addEventListener("resize",drawNumbers);

/* ===== HEAT INDEX ===== */
function computeHeatIndex(C, R){
  if(C < 27) return C.toFixed(1);
  let T = C * 9/5 + 32; // to Fahrenheit
  let HI = -42.379 + 2.04901523*T + 10.14333127*R - 0.22475541*T*R - 0.00683783*T*T - 0.05481717*R*R + 0.00122874*T*T*R + 0.00085282*T*R*R - 0.00000199*T*T*R*R;
  return ((HI - 32) * 5/9).toFixed(1); // back to Celsius
}


/* ===== TYPHOON SIGNAL ===== */
function updateStormSignal(level){

const el=document.getElementById("stormSignal");

switch(level){

case 0: el.innerHTML="🌀 Signal No. 0"; el.style.background="#42DC18"; break;
case 1: el.innerHTML="🌀 Signal No. 1"; el.style.background="#08F7DF"; break;
case 2: el.innerHTML="🌀 Signal No. 2"; el.style.background="#EEFA05"; break;
case 3: el.innerHTML="🌀 Signal No. 3"; el.style.background="#FA8C05"; break;
case 4: el.innerHTML="🌀 Signal No. 4"; el.style.background="#F50014"; break;
case 5: el.innerHTML="🌀 Signal No. 5"; el.style.background="#F005EC"; break;
default: el.innerHTML="🌀 Signal No. 0"; el.style.background="#42DC18";
}

}

window.lastReceive = Date.now(); 

/* ===== LIVE FIREBASE DATA ===== */
firebase.database()
.ref("weather")
.on("value",(snapshot)=>{

let d=snapshot.val();
console.log(d);

let temp = Number(d.temp || 0);
let humidity = Number(d.humidity || 0);

let windDeg = Number(d.winddir || 0);      // Ginamit na si d
let windCard = d.cardinal || "N";          // Ginamit na si d
let displayText = windCard + " (" + Math.round(windDeg) + "°)";

let condition=(d.condition || "SUNNY").toUpperCase();

let icon="☀️";

switch(condition){

case "SUNNY":
icon="☀️";
break;

case "PARTLY CLOUDY":
icon="⛅";
break;

case "CLOUDY":
icon="☁️";
break;

case "RAINY":
icon="🌧️";
break;

case "THUNDERSTORM":
icon="⛈️";
break;

case "WINDY":
icon="🌬️";
break;

default:
icon="🌤️";
}

document.getElementById("weatherIcon").innerHTML=icon;
document.getElementById("weatherCondition").innerHTML=condition;

document.getElementById("temp").innerHTML = parseInt(d.temp) || 0;
document.getElementById("humidity").innerHTML = Math.round(Number(d.humidity) || 0);
document.getElementById("pressure").innerHTML= Math.round(Number(d.pressure) || 0);
document.getElementById("wind").innerHTML = d.wind ?? '--';
document.getElementById("gust").innerHTML = d.gust ?? '--';
document.getElementById("rain").innerHTML = d.rain ?? '0';
document.getElementById("windDirection").innerText = windCard;
document.getElementById("windDegrees").innerText = Math.round(windDeg);


document.getElementById("feelsLike").innerHTML=
computeHeatIndex(
parseFloat(d.temp || 0),
parseFloat(d.humidity || 0)
);
updateStormSignal(d.stormSignal);
window.lastReceive=Date.now()
});


setInterval(()=>{

let status=document.getElementById("deviceStatus");

if(Date.now()-window.lastReceive>7000){

status.innerHTML=
"STATION OFFLINE";

status.style.background=
"#E74C3C";

}
else{

status.innerHTML=
"STATION ONLINE";

status.style.background=
"#2ECC71";

}

},1000);

let lat=13.4395;
let lon=121.8230;

let map=L.map('map',{zoomControl:true,minZoom:2,maxZoom:18}).setView([lat,lon],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'Map'
}
).addTo(map);

L.marker([lat,lon])
.addTo(map)
.bindPopup("Shao Weather Station")
.openPopup();

// ↓↓↓ GALAW NG HANGIN - TULDOK-TULDOK ↓↓↓
let velocityLayer;

function loadWind() {
  let data = [
    {
      "header": {
        "parameterCategory": 2, "parameterNumber": 2,
        "nx": 144, "ny": 73, "lo1": 0, "la1": 90, "lo2": 357.5, "la2": -90, "dx": 2.5, "dy": 2.5
      },
      "data": []
    },
    {
      "header": {
        "parameterCategory": 2, "parameterNumber": 3,
        "nx": 144, "ny": 73, "lo1": 0, "la1": 90, "lo2": 357.5, "la2": -90, "dx": 2.5, "dy": 2.5
      },
      "data": []
    }
  ];

  // Fake paikot na hangin para sa demo
  for(let i = 0; i < 144*73; i++){
    let x = i % 144;
    let y = Math.floor(i / 144);
    let cx = 124/2.5;
    let cy = (90-13.5)/2.5;
    let angle = Math.atan2(y - cy, x - cx) + Math.PI/2;
    let dist = Math.sqrt((x-cx)**2 + (y-cy)**2);
    let speed = Math.max(0, 20 - dist*0.6);
    data[0].data[i] = Math.cos(angle) * speed;
    data[1].data[i] = Math.sin(angle) * speed;
  }

  if(velocityLayer) map.removeLayer(velocityLayer);

  velocityLayer = L.velocityLayer({
    displayValues: false,
    displayOptions: {
      velocityType: 'Wind',
      position: 'bottomleft',
      speedUnit: 'km/h'
    },
    data: data,
    maxVelocity: 30,
    velocityScale: 0.005,
    particleAge: 60, // para maging tuldok-tuldok
    lineWidth: 1, // laki ng tuldok
    particleMultiplier: 1/180, // dami ng tuldok
    frameRate: 12, // para stuttered
    pathLength: 20, 
    colorScale: ["#FFFFFF"]
  });

  velocityLayer.addTo(map);
}
loadWind();

// Ulan layer - static pa rin pero okay na yan
let rainLayer = L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=3ff542adbc37dfce7cd1ac05966ae239`, {
  opacity: 0.9
}).addTo(map);

L.control.layers(null, {
  "WIND": velocityLayer,
  "RAIN": rainLayer
}).addTo(map);

// Refresh every 30 mins
setInterval(loadWind, 1800000);
</script>

</body>
</html>
